name: dookai
description: "Your Smart AI Assistant - A modern AI chatbot app built with Flutter and Firebase."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  firebase_storage: ^13.4.3
  cloud_firestore: ^6.6.0

  # Google Sign-In
  google_sign_in: ^7.2.0

  # State Management
  provider: ^6.1.0
  flutter_riverpod: ^3.3.2

  # UI & Design
  google_fonts: ^8.2.0
  cached_network_image: ^3.3.0
  lottie: ^2.7.0
  animate_do: ^5.1.0

  # HTTP & API
  http: ^1.1.0
  dio: ^5.3.1

  # Markdown
  flutter_markdown: ^0.7.7+1
  markdown: ^7.1.1

  # Code Highlighting
  highlight: ^0.7.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.0.0
  connectivity_plus: ^7.3.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1

  # Custom packages
  flutter_spinkit: ^5.2.0
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^3.0.3

flutter:
  uses-material-design: true
