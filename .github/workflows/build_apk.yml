name: Build Android APKs

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        # Ensure all run steps execute from the app subfolder by default
        working-directory: ./app

    env:
      FLUTTER_HOME: ${{ runner.tool_cache }}/flutter

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter (stable 3.24.0)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Cache Pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Validate Flutter + Android SDK
        run: |
          flutter --version
          flutter doctor -v

      - name: Accept Android licenses
        run: |
          yes | flutter doctor --android-licenses

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APKs
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: |
            app/build/app/outputs/flutter-apk/*.apk
