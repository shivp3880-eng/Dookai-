name: Build Android Release APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Ignore Broken Submodules Manually
        run: |
          git config --global submodule.recurse false
          git rm --cached flutter || true

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'oracle'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Force Clean and Repair Android Config
        run: |
          cd app
          rm -rf android
          flutter create . --platforms=android

      - name: Auto Upgrade Outdated Plugins
        run: |
          cd app
          flutter pub upgrade --major-versions

      - name: Fix Android Manifest Exported Attribute
        run: |
          MANIFEST_PATH="app/android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_PATH" ]; then
            sed -i 's/<activity/<activity android:exported="true"/g' "$MANIFEST_PATH"
          fi

      - name: Fix Flutter SDK Path for Gradle Environment
        run: |
          mkdir -p app/android
          echo "flutter.sdk=$FLUTTER_ROOT" > app/android/local.properties

      - name: Build APK
        run: |
                - name: Build APK
        run: flutter build apk --release --split-per-abi
        working-directory: app
        
          
      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dookai-release-apks
                    path: app/build/outputs/apk/release/*.apk
                    
          
